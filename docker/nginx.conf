map $http_x_forwarded_proto $tmail_forwarded_proto {
    default $scheme;
    http http;
    https https;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 5m;

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ ^/(?:domains(?:/|$)|accounts$|token$|me$|messages(?:/|$)|sources(?:/|$)|site$|admin/api(?:/|$)|docs(?:/|$)|redoc$|openapi\.json$|sandbox$|message-sandbox$) {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $tmail_forwarded_proto;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store";
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; frame-src 'self'; frame-ancestors 'none'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }
}
